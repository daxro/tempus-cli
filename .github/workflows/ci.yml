name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: tempus-cli
          persist-credentials: false
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: daxro/stockholm-freja
          path: stockholm-freja
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.9.28"
          enable-cache: true
      - run: uv sync --locked
        working-directory: tempus-cli
      - run: uv run --no-sync pytest -q
        working-directory: tempus-cli
      - run: uv run --no-sync python -m compileall -q tempus_cli tests
        working-directory: tempus-cli
      - run: uv build
        working-directory: tempus-cli
      - run: git diff --check
        working-directory: tempus-cli
